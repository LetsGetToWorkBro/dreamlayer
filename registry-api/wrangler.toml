name = "dreamlayer-registry-api"
main = "worker.js"
compatibility_date = "2024-11-01"

# The social layer for the plugin store — ratings, comments, downloads.
# Plugin CODE lives in the git-backed registry; this only serves the numbers.

# KV namespace holding the social data. Create it once, then paste the id:
#   npx wrangler kv namespace create SOCIAL
[[kv_namespaces]]
binding = "SOCIAL"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Raw registry index the /api/plugins list folds live stats into.
INDEX_URL = "https://raw.githubusercontent.com/LetsGetToWorkBro/dreamlayer/main/registry/index.json"
