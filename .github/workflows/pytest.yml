name: pytest

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: host-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: host-python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,verify,sync]"   # verify→crosshair proofs, sync→loro CRDT

      - name: "Lint — ruff (pyflakes: dead imports/vars, undefined names)"
        # The high-signal static-analysis gate. Config in pyproject
        # [tool.ruff.lint]: pyflakes + syntax, house-style rules off. A
        # contributor can't quietly land dead code or an undefined name.
        run: ruff check src/dreamlayer

      - name: Typecheck — mypy over the whole dreamlayer package
        # Was 4 of 323 files behind --follow-imports=skip; the repo-wide typing
        # pass landed (audit 2026-07-14, Type-Safety C+ -> A-), so the gate now
        # covers the whole tree via [tool.mypy] in pyproject.toml
        # (ignore_missing_imports + follow_imports=silent, a pragmatic non-strict
        # baseline). The formal-methods safety core — contracts, budgets,
        # flash_safety, signer — stays fully typed and is covered by this run.
        # Four leaf/subsystem modules (qr bit-matrix, the RC-v2 choreographer,
        # the NL intent_parser's Literal fields, the hardware-gated BLE bridge)
        # are a documented ignore_errors backlog in [[tool.mypy.overrides]];
        # everything else, incl. the mixin<->host contract, is enforced.
        # `python -m mypy` (not the bare `mypy` entrypoint) guarantees the type
        # checker runs under the same interpreter that installed the deps, so it
        # sees the packages it should — the entrypoint can resolve to a different
        # Python whose site-packages differ, silently changing what gets checked.
        run: python -m mypy src/dreamlayer

      - name: Run pytest
        # hardware/benchmark tests need a device or run only on demand.
        # --cov-fail-under is set 5 points below the measured total (90%) so
        # coverage can only rot LOUDLY — a drop fails the build.
        #
        # Every test in this run executes under the autouse no-cloud-egress
        # audit hook (tests/conftest.py): a process-wide socket.connect tripwire
        # that RAISES on any connection to a public host. So a green run is also
        # a standing proof that the whole suite reaches nothing but loopback/LAN
        # — the privacy claim, checked at the OS boundary, not by a self-counter.
        run: >
          pytest --tb=short -m "not hardware and not benchmark and not real_model and not allow_egress"
          --cov=dreamlayer --cov-report=term-missing --cov-fail-under=85

      - name: No-egress proof — run network-sensitive tests in an empty netns
        # Belt-and-suspenders to the in-process audit hook: run the actual
        # network-touching tests where the box has NO route off-device, so even a
        # deleted hook can't make egress succeed. `unshare -rn` maps our uid to
        # root in a fresh user+network namespace and we bring loopback up
        # (localhost-binding tests need it), but there is no default route, so any
        # public send fails at the kernel — and it actually EXECUTES the tests
        # (the prior version only self-tested unshare, refute 2026-07-18).
        #
        # This requires UNPRIVILEGED user namespaces. GitHub-hosted runners forbid
        # them ("write failed /proc/self/uid_map: Operation not permitted"), so we
        # PROBE first and skip cleanly there — the in-process audit hook already
        # proved zero egress in the main pytest step above; this leg is the extra
        # OS-boundary check for self-hosted runners that permit userns. It is
        # therefore never allowed to fail the build for lack of the capability;
        # only a real egress inside the netns fails it.
        run: |
          if ! command -v unshare >/dev/null; then
            echo "unshare unavailable; relying on the in-process audit hook"; exit 0
          fi
          if ! unshare -rn true 2>/dev/null; then
            echo "unprivileged user namespaces not permitted on this runner "\
                 "(GitHub-hosted); the in-process audit hook stands alone"; exit 0
          fi
          unshare -rn bash -c '
            ip link set lo up 2>/dev/null || true
            pytest --tb=short -p no:cacheprovider \
              src/dreamlayer/tests/test_no_egress.py \
              src/dreamlayer/tests/test_activity_receipt.py \
              src/dreamlayer/tests/test_capture_pipeline.py \
              src/dreamlayer/tests/test_ai_brain_server.py \
              src/dreamlayer/tests/test_primary_api_brain.py
          '

  test-windows:
    # The Windows Brain is a shipping target (the tray app), so Windows
    # regressions must fail CI, not users. A targeted slice — the appliance
    # cores, the Brain server + indexer, and the Windows sources — runs on
    # windows-latest; the full suite, lint, and typecheck stay on the Linux
    # job above. The registry Run-entry round-trip test only executes here
    # (it's skipped everywhere else).
    runs-on: windows-latest

    defaults:
      run:
        working-directory: host-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: host-python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Run pytest (appliance + ai_brain + indexer suites)
        run: >
          pytest --tb=short -m "not hardware and not benchmark and not real_model and not allow_egress"
          src/dreamlayer/tests/test_windows_appliance.py
          src/dreamlayer/tests/test_windows_panel_window.py
          src/dreamlayer/tests/test_windows_sources.py
          src/dreamlayer/tests/test_windows_hygiene.py
          src/dreamlayer/tests/test_mac_appliance.py
          src/dreamlayer/tests/test_ai_brain.py
          src/dreamlayer/tests/test_ai_brain_server.py
          src/dreamlayer/tests/test_ai_brain_macos.py
          src/dreamlayer/tests/test_brain_controls.py
          src/dreamlayer/tests/test_brain_capabilities.py
          src/dreamlayer/tests/test_brain_auth_posture.py
          src/dreamlayer/tests/test_brain_csrf_write_guard.py
          src/dreamlayer/tests/test_brain_tiers.py
          src/dreamlayer/tests/test_brain_rc.py
          src/dreamlayer/tests/test_server_atomic_stores.py
