name: dependency-review

# Supply-chain gate at the PR seam, complementary to dep-audit.yml (pip-audit,
# which scans *resolved installed* versions weekly + on dep changes). This runs
# GitHub's dependency-review-action on the PR diff itself: it blocks a pull
# request that INTRODUCES a dependency with a known advisory or an incompatible
# license before it ever merges, and posts the findings inline on the PR. The
# two together cover both "a new CVE landed on a dep we already ship" (pip-audit
# cron) and "this PR adds a bad dep" (here).

on:
  pull_request:
    paths:
      - "host-python/pyproject.toml"
      - "host-python/uv.lock"
      - "**/package.json"
      - "**/package-lock.json"
      - "**/Cargo.toml"
      - "**/Cargo.lock"

permissions:
  contents: read
  pull-requests: write   # so the action can comment its summary on the PR

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Dependency review
        # dependency-review-action REQUIRES GitHub's Dependency graph feature
        # (repo Settings → Security → Dependency graph), now enabled — so this is a
        # BLOCKING PR-time gate: a pull request that INTRODUCES a dependency with a
        # moderate+ advisory or a denied (GPL/AGPL) license fails here. It
        # complements dep-audit.yml's resolved-tree scan (pip-audit + license gate).
        # Add "review" to branch protection's required checks to enforce it on merge.
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          # Fail the PR on a moderate-or-worse advisory in an added dependency.
          fail-on-severity: moderate
          # STRONG-copyleft (GPL/AGPL) is denied; LGPL is allowed (weak copyleft,
          # dynamic linking), matching the dep-audit.yml resolved-tree gate exactly
          # (they previously disagreed on LGPL). Both the deprecated short SPDX ids
          # and the canonical -only/-or-later forms are listed, so a dep reported
          # either way is caught.
          deny-licenses: >-
            GPL-2.0, GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0, GPL-3.0-only, GPL-3.0-or-later,
            AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later
          comment-summary-in-pr: on-failure
