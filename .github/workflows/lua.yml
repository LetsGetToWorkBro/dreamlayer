# The device Lua gets a native lint gate (halo-lua/.luacheckrc): no
# undefined globals beyond the device runtime's, no shadowing, no syntax
# drift. Behavior is still covered by the lupa raster harness in pytest;
# this catches what only a Lua-aware tool sees.
#
# Why luacheck and not selene: selene is the more actively maintained linter,
# but every published `selene` binary ships full-moon's Luau/Roblox parser,
# which cannot parse Lua 5.3 bitwise operators (`>>`, `&`, `//`) — and the
# device code uses them (e.g. display/palette.lua: `(hex >> 16) & 0xFF`). The
# lua53 syntax feature is not forwarded by the selene crate, so no
# `cargo install selene` can lint this codebase; it produced 13 hard parse
# errors on the 5.3 files regardless of version or feature flags. A selene std
# for the Frame device API is staged in halo-lua/{selene.toml,dreamlayer.yml}
# for the day selene can parse 5.3, but the CI job is intentionally not wired:
# a permanently-red, can-never-pass job is worse than none. luacheck handles
# 5.3 natively and is the gate.
name: lua

on:
  push:
    branches: [main]
    paths: ["halo-lua/**", ".github/workflows/lua.yml"]
  pull_request:
    paths: ["halo-lua/**", ".github/workflows/lua.yml"]

permissions:
  contents: read   # least-privilege floor; jobs opt into more where needed

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check
      - name: Lint the device Lua
        working-directory: halo-lua
        run: luacheck . --no-color
