# Maestro E2E for the phone app (the Look/world-lens camera flow).
#
# jest covers the store logic; Maestro drives the REAL app on an Android emulator
# — the camera-permission path, the capture, and an honest response render that a
# unit test can't reach. This is MANUAL/informational, not a PR gate: it builds a
# debug APK + boots an emulator (slow, and emulator E2E is inherently flakier than
# a unit run), so it runs on demand (workflow_dispatch) rather than blocking every
# PR. Promote to a nightly `schedule` once it's proven stable in your runners.
name: maestro

on:
  workflow_dispatch: {}

permissions:
  contents: read   # least-privilege floor; jobs opt into more where needed

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: phone-app/package-lock.json
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"
      - name: Build a debug APK (expo prebuild → gradle)
        working-directory: phone-app
        run: |
          npm ci
          npx expo prebuild --platform android --no-install
          cd android && ./gradlew assembleDebug --no-daemon
      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro on an emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r phone-app/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test phone-app/.maestro/
