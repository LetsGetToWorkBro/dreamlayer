name: dependency-audit

# Supply-chain gate (audit 2026-07-14): the repo had NO automated CVE scanning,
# while ~50 optional deps (including security-critical `cryptography`) were
# declared as unpinned names. pip-audit flags known-vulnerable resolved
# versions. Runs on PRs touching deps and weekly, so a newly-disclosed CVE
# surfaces even with no code change.

on:
  push:
    paths:
      - "host-python/pyproject.toml"
      - "host-python/uv.lock"
      - ".github/workflows/dep-audit.yml"
  pull_request:
    paths:
      - "host-python/pyproject.toml"
      - "host-python/uv.lock"
  schedule:
    - cron: "0 6 * * 1"      # Mondays 06:00 UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    # Informational on introduction: it surfaces advisories in the (large,
    # pre-existing) optional-dependency tree without gating every PR before the
    # tree has been triaged. Flip continue-on-error off to make it a hard gate
    # once the baseline is clean.
    continue-on-error: true
    defaults:
      run:
        working-directory: host-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install the security-relevant dependency surface
        run: |
          python -m pip install --upgrade pip
          # pip-audit matches *resolved installed versions* against advisory
          # DBs, so we install the deps that actually ship secrets/crypto/
          # network paths: the `privacy` (crypto + PII) and `llm` (provider
          # network) extras, plus the HTTP server (fastapi/uvicorn).
          #
          # We deliberately do NOT install the whole `platform` extra. It drags
          # in native-build device/rendering deps (frame-sdk→simpleaudio→ALSA,
          # pylsl, skia-python) that require system libraries absent on the
          # runner — the build failed there before pip-audit could run, and
          # those deps aren't part of the CVE surface this job exists to guard.
          # Add new crypto/network deps to this line as they're introduced.
          pip install -e ".[privacy,llm]" fastapi uvicorn
      - name: pip-audit — report known-vulnerable resolved dependencies
        run: |
          pip install pip-audit
          pip-audit --strict --progress-spinner=off
