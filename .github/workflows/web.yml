# Build smoke for the marketing site: typecheck + Vite build must succeed.
# (The Playwright screenshot e2e stays a local/deploy-time tool — this gate
# is about a contributor not being able to break the build with a green
# check.)
name: web

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web.yml"]

permissions:
  contents: read   # least-privilege floor; jobs opt into more where needed

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
