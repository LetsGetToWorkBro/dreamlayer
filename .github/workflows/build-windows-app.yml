name: Build Windows app (installer)

# Builds the double-click DreamLayer Brain system-tray app with PyInstaller,
# wraps it in a per-user Inno Setup installer, smoke-launches the exe, and
# uploads the artifact. Manual (Run workflow) or on a version tag (v*) — the
# same triggers as the macOS pipeline. Does NOT run on normal pushes/PRs, so
# it never gates regular CI.
#
# Optional repo secrets (Settings -> Secrets and variables -> Actions) turn on
# Authenticode signing of both the exe and the installer:
#   WINDOWS_CERT_PFX_BASE64   code-signing cert + key, exported .pfx, base64-encoded
#   WINDOWS_CERT_PASSWORD     password for that .pfx
# Unsigned builds still work — Defender SmartScreen shows "More info -> Run
# anyway" on first launch (packaging/README.md documents this the way it
# documents Gatekeeper for unsigned .dmg builds).
#
# Publishing mirrors build-macos-app.yml: a `v*` tag build attaches the
# installer to the Release for that tag; a manual run publishes only when the
# `publish` box is ticked, tagged from the package __version__.

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Also publish the installer as a Release on this repo"
        type: boolean
        default: false
  push:
    tags: ["v*"]

permissions:
  contents: write   # so a tag build can attach the installer to a Release

jobs:
  build:
    runs-on: windows-latest
    env:
      # signing is optional: on only when the cert secret exists
      HAVE_CERT: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install app + build tooling
        run: |
          python -m pip install --upgrade pip wheel
          pip install ./host-python          # dreamlayer + Pillow/numpy/openai
          # Starter capabilities baked in, same as the .dmg (small wheels, no
          # models): zeroconf -> the phone finds the Brain on the LAN;
          # cryptography -> Ed25519 provenance signatures.
          pip install zeroconf cryptography
          pip install pystray                # the system-tray shell
          pip install pywebview              # WebView2 for the native panel window
          pip install pyinstaller

      - name: Build dreamlayer.ico + installer wizard art from the shared art
        run: |
          cd host-python/packaging/windows
          python make_ico.py
          python make_installer_art.py

      - name: Build the app (PyInstaller, windowed one-dir)
        run: |
          cd host-python/packaging/windows
          pyinstaller DreamLayer.spec --noconfirm

      - name: Import signing certificate
        if: env.HAVE_CERT == 'true'
        env:
          PFX: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx",
            [Convert]::FromBase64String($env:PFX))

      - name: Sign DreamLayer.exe
        if: env.HAVE_CERT == 'true'
        env:
          PFX_PASS: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:PFX_PASS" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            host-python/packaging/windows/dist/DreamLayer/DreamLayer.exe

      - name: Smoke-launch the exe
        # the CI stand-in for "double-click on a clean Windows 11 machine":
        # the windowed exe must boot the server, answer on :7777, mint a
        # first-run pairing token, and exit 0 in --smoke mode.
        run: |
          $exe = "host-python/packaging/windows/dist/DreamLayer/DreamLayer.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--smoke" -PassThru -Wait
          if ($p.ExitCode -ne 0) { throw "smoke launch failed ($($p.ExitCode))" }
          $cfg = Get-Content "$env:USERPROFILE\.dreamlayer\brain_config.json" | ConvertFrom-Json
          if (-not $cfg.token) { throw "first-run pairing token was not minted" }
          Write-Host "smoke OK - server answered and token minted"

      - name: Resolve version
        id: ver
        run: |
          $v = python -c "from dreamlayer import __version__ as v; print(v)"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build the installer (Inno Setup)
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" }
          cd host-python/packaging/windows
          & $iscc /DAppVersion=${{ steps.ver.outputs.version }} installer.iss
          Move-Item Output\DreamLayer-Setup.exe ..\..\..\DreamLayer-Setup.exe

      - name: Sign the installer
        if: env.HAVE_CERT == 'true'
        env:
          PFX_PASS: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:PFX_PASS" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 DreamLayer-Setup.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: DreamLayer-windows
          path: DreamLayer-Setup.exe

      - name: Resolve release tag
        id: rel
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=v${{ steps.ver.outputs.version }}" >> $env:GITHUB_OUTPUT
          }

      - name: Publish the Release (this repo)
        if: github.ref_type == 'tag' || inputs.publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: DreamLayer ${{ steps.rel.outputs.tag }}
          fail_on_unmatched_files: true
          files: DreamLayer-Setup.exe
          body_path: .github/RELEASE_NOTES.md
