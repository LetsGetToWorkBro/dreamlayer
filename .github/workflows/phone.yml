# The phone app finally has a CI gate: a contributor could previously break
# the pairing codec, the stores, or the whole TypeScript build with a green
# check (the pytest workflow never looked at phone-app/).
name: phone

on:
  push:
    branches: [main]
    paths: ["phone-app/**", ".github/workflows/phone.yml"]
  pull_request:
    paths: ["phone-app/**", ".github/workflows/phone.yml"]

jobs:
  phone:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phone-app
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: phone-app/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (stores, pairing codec, haptic vocabulary)
        run: npm test -- --ci
      # The privacy contract, enforced: prebuild the Android project and fail
      # if the merged manifest gains a permission off the allowlist, loses the
      # LAN-scoped network security config, or grows a blanket cleartext flag.
      - name: Android manifest permission audit
        run: |
          npx expo prebuild --platform android --no-install
          node scripts/audit-android-permissions.mjs
      # The Play listing sources must keep generating a valid supply tree
      # (length limits are hard failures, same as a type error).
      - name: Play listing limits
        run: node scripts/build-play-metadata.mjs
