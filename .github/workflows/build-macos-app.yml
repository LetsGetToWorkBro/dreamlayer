name: Build macOS app (.dmg)

# Builds the double-click DreamLayer Brain menu-bar app, signs + notarizes it,
# and wraps it in a .dmg. Manual (Run workflow) or on a version tag (v*).
# Does NOT run on normal pushes/PRs, so it never gates regular CI.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   MACOS_CERT_P12_BASE64   Developer ID Application cert + key, exported .p12, base64-encoded
#   MACOS_CERT_PASSWORD     password for that .p12
#   MACOS_SIGN_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                Apple ID email used for notarization
#   APPLE_TEAM_ID           10-char Apple Developer Team ID
#   APPLE_APP_PASSWORD      app-specific password for that Apple ID (appleid.apple.com)
#   KEYCHAIN_PASSWORD       any string — password for the ephemeral build keychain
#
# Publishing: a `git push` of a `v*` tag builds AND publishes a Release on THIS
# repo (tag = the pushed tag), with notes from .github/RELEASE_NOTES.md. A manual
# run publishes only when you tick the `publish` box, tagged from the package
# __version__. (Releases used to live in the separate dreamlayer-releases repo,
# from before this repo was public; that repo is retired.)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Also publish the .dmg as a Release on this repo"
        type: boolean
        default: false
  push:
    tags: ["v*"]

permissions:
  contents: write     # so a tag build can attach the .dmg to a Release
  id-token: write     # OIDC token the provenance signer exchanges (SLSA)
  attestations: write # write the build-provenance attestation for the .dmg

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install app + build tooling
        run: |
          python -m pip install --upgrade pip wheel
          pip install ./host-python          # dreamlayer + Pillow/numpy/openai
          # Starter capabilities baked into the DMG (small wheels, no models):
          # zeroconf -> the phone finds the Brain on the LAN automatically;
          # cryptography -> Ed25519 provenance signatures. The panel's
          # Capabilities view shows both as active in the shipped app.
          pip install zeroconf cryptography
          pip install py2app rumps            # rumps pulls in pyobjc-core + Cocoa
          pip install pyobjc-framework-WebKit # WKWebView for the native window
          brew install create-dmg

      - name: Build .icns from icon.png
        run: |
          cd host-python/packaging
          rm -rf DreamLayer.iconset && mkdir DreamLayer.iconset
          # The detailed "little Mac" icon can't read below ~64px, so the small
          # slots (<=32px) use a dedicated simplified mark (icon_small.png — the
          # teal ring on the dusk squircle); larger slots downscale icon.png.
          gen() { sips -z "$2" "$2" "$1" --out "DreamLayer.iconset/icon_$3.png"; }
          gen icon_small.png 16  16x16
          gen icon_small.png 32  16x16@2x
          gen icon_small.png 32  32x32
          gen icon.png       64  32x32@2x
          gen icon.png       128 128x128
          gen icon.png       256 128x128@2x
          gen icon.png       256 256x256
          gen icon.png       512 256x256@2x
          gen icon.png       512 512x512
          gen icon.png       1024 512x512@2x
          iconutil -c icns DreamLayer.iconset -o dreamlayer.icns

      - name: Build the .app (py2app)
        run: |
          cd host-python/packaging
          python setup_app.py py2app

      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12

      - name: Sign the .app (hardened runtime + entitlements)
        env:
          SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          APP="host-python/packaging/dist/DreamLayer.app"
          ENT="host-python/packaging/entitlements.plist"
          # sign every nested Mach-O first (notarization rejects unsigned nested code)
          find "$APP/Contents" \( -name "*.so" -o -name "*.dylib" \) -print0 | while IFS= read -r -d '' f; do
            codesign --force --timestamp --options runtime -s "$SIGN_ID" "$f"
          done
          find "$APP/Contents" -type f -perm -111 \( -name "python*" -o -name "*.bin" \) -print0 | while IFS= read -r -d '' f; do
            codesign --force --timestamp --options runtime -s "$SIGN_ID" "$f" || true
          done
          codesign --force --deep --timestamp --options runtime \
            --entitlements "$ENT" -s "$SIGN_ID" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create .dmg
        run: |
          # the Platinum window dressing: dusk background (1x+2x stapled into a
          # HiDPI tiff) + the volume icon. Coordinates here are the contract
          # make_dmg_art.py draws against — change them together.
          ( cd host-python/packaging && python make_dmg_art.py )
          tiffutil -cathidpicheck \
            host-python/packaging/dmg-background.png \
            host-python/packaging/dmg-background@2x.png \
            -out host-python/packaging/dmg-background.tiff || \
          cp host-python/packaging/dmg-background.png host-python/packaging/dmg-background.tiff
          mkdir -p stage && cp -R host-python/packaging/dist/DreamLayer.app stage/
          create-dmg \
            --volname "DreamLayer" \
            --volicon "host-python/packaging/dreamlayer.icns" \
            --background "host-python/packaging/dmg-background.tiff" \
            --window-size 600 380 \
            --icon-size 128 \
            --text-size 12 \
            --icon "DreamLayer.app" 150 180 \
            --app-drop-link 450 180 \
            --hdiutil-quiet \
            "DreamLayer.dmg" "stage/" || \
          hdiutil create -volname "DreamLayer" -srcfolder stage -ov -format UDZO "DreamLayer.dmg"

      - name: Sign the .dmg
        env:
          SIGN_ID: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: codesign --force --timestamp -s "$SIGN_ID" "DreamLayer.dmg"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "DreamLayer.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple "DreamLayer.dmg"
          spctl -a -t open --context context:primary-signature -v "DreamLayer.dmg" || true

      # SLSA build provenance: a signed, verifiable statement of WHERE this .dmg
      # was built (this repo, this workflow, this commit) and that it came out of
      # CI, not someone's laptop. Codesigning proves who signed; provenance
      # proves the build's origin — the two are complementary. Verify with
      # `gh attestation verify DreamLayer.dmg -R <owner>/<repo>`.
      - name: Attest build provenance (.dmg)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: DreamLayer.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: DreamLayer-dmg
          path: DreamLayer.dmg

      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(python -c 'from dreamlayer import __version__ as v; print(v)')" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish the Release (this repo)
        if: github.ref_type == 'tag' || inputs.publish
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: DreamLayer ${{ steps.rel.outputs.tag }}
          fail_on_unmatched_files: true
          files: DreamLayer.dmg
          body_path: .github/RELEASE_NOTES.md
