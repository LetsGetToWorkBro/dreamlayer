name: mutation

# Mutation testing for the on-glass safety core. The default `pytest` job proves
# the tests PASS; this job proves they actually CATCH BUGS — mutmut mutates the
# four safety-core files (contracts.py, budgets.py, flash_safety.py, signer.py;
# see [tool.mutmut] in host-python/pyproject.toml) and checks the killer suites
# actually kill the mutants.
#
# The gate is a per-file survivor CEILING, not a blanket zero. contracts.py and
# signer.py hold at ZERO survivors. budgets.py and flash_safety.py carry a
# measured residue of non-behavioral mutants (mutations of diagnostic message
# strings, deps-absent degradation branches that can't execute with the deps
# installed, and provably-equivalent forms — itemized in the docstrings of
# test_budgets_boundaries.py and test_flash_safety_unit.py). Their ceilings are
# those measured counts, so any NEW survivor — a real test hole — still fails
# the job, while the documented residue doesn't ratchet. Lower a ceiling when
# you kill residue; never raise one without the same class of justification.
#
# Not on every push (it copies + re-runs per mutant); on demand + weekly.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC

jobs:
  mutation:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.repository_owner == 'LetsGetToWorkBro'

    defaults:
      run:
        working-directory: host-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: host-python/pyproject.toml

      - name: Install with the mutation extra
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,mutation]"

      - name: Run mutation testing on the safety core
        run: mutmut run

      - name: Enforce per-file survivor ceilings
        run: |
          mutmut results | tee /tmp/results.txt
          python - <<'PY'
          import re, sys
          from collections import Counter

          # Measured baselines (P2-13). "survived" and "no tests" both count —
          # an uncovered mutant is a hole exactly like a surviving one.
          CEILINGS = {
              "contracts": 0,       # the proof core: always zero
              "signer": 0,          # the deploy trust anchor: always zero
              "budgets": 213,       # diagnostic-string + equivalent residue
              "flash_safety": 15,   # degradation branches + boundary-exact forms
          }

          per = Counter()
          for line in open("/tmp/results.txt"):
              m = re.match(
                  r"\s*dreamlayer\.reality_compiler\.v2\.(\w+)\..*: "
                  r"(survived|no tests)$", line)
              if m:
                  per[m.group(1)] += 1

          failed = False
          for fname, ceiling in CEILINGS.items():
              n = per.get(fname, 0)
              status = "OK " if n <= ceiling else "OVER"
              print(f"[{status}] {fname}.py: {n} survivors (ceiling {ceiling})")
              if n > ceiling:
                  failed = True
          unknown = set(per) - set(CEILINGS)
          if unknown:
              print(f"[OVER] survivors in files with no ceiling: {sorted(unknown)}")
              failed = True
          if failed:
              print("::error::A safety-core file exceeded its mutation-survivor "
                    "ceiling — the killer tests have a NEW hole.")
              sys.exit(1)
          print("All safety-core files within their survivor ceilings.")
          PY
